name: OpenWrt Builder v2.2
run-name: "build ${{ inputs.build }}"

on:
  workflow_dispatch:
    inputs:
      build:
        description: "Build Tag/Version"
        type: string
        required: false
      configuration:
        description: 'Configuration Folder'
        required: true
        default: 'x86_64-25.12-pw-mos'
        type: choice
        options:
          - x86_64-25.12-pw-mos
          - x86_64-24.10-pw
      runner:
        description: 'Runner OS'
        required: true
        default: 'ubuntu-22.04'
        type: choice
        options:
          - ubuntu-20.04
          - ubuntu-22.04
          - ubuntu-24.04
          - ubuntu-26.04

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ github.event.inputs.runner }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Prepare Environment Variables
        run: |
          echo "CONFIG_NAME=${{ github.event.inputs.configuration }}" >> $GITHUB_ENV
          echo "CONFIG_PATH=${{ github.workspace }}/${{ github.event.inputs.configuration }}" >> $GITHUB_ENV
          echo "DEPENDENCIES=depends-${{ github.event.inputs.runner }}" >> $GITHUB_ENV
          echo "BUILD_ROOT=${{ github.workspace }}/openwrt" >> $GITHUB_ENV
          if [ -f "./${{ github.event.inputs.configuration }}/.env" ]; then
            grep -v -e '^#' -e '^\s*$' ./${{ github.event.inputs.configuration }}/.env >> $GITHUB_ENV
          fi

      - name: Maximize Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap: false

      - name: Install System Dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E apt-get -qq update
          if [ -f "$DEPENDENCIES" ]; then
            sudo -E apt-get -qq install -y $(cat $DEPENDENCIES | xargs)
          else
            sudo -E apt-get -qq install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev python3-distutils python3-setuptools rsync swig unzip zlib1g-dev file wget
          fi
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean
          sudo timedatectl set-timezone "${TZ:-Asia/Shanghai}"

      - name: Clone Source Code
        run: |
          git clone --depth=1 -b $REPO_BRANCH $REPO_URL $BUILD_ROOT

      - name: Cache ccache & dl
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.BUILD_ROOT }}/dl
            ~/.ccache
          key: ${{ runner.os }}-openwrt-${{ env.CONFIG_NAME }}-${{ hashFiles('**/feeds.conf.default', '**/.config') }}
          restore-keys: |
            ${{ runner.os }}-openwrt-${{ env.CONFIG_NAME }}-

      - name: Compile Firmware
        id: compile
        run: |
          cd $BUILD_ROOT
          
          [ -d $CONFIG_PATH/patchs ] && chmod +x $CONFIG_PATH/patchs/*.sh || :
          [ -f $CONFIG_PATH/feeds.conf.default ] && mv $CONFIG_PATH/feeds.conf.default ./feeds.conf.default
          [ -f $CONFIG_PATH/patchs/before_feeds.sh ] && $CONFIG_PATH/patchs/before_feeds.sh || :
          
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
          [ -d $CONFIG_PATH/files ] && mv $CONFIG_PATH/files ./files
          [ -f $CONFIG_PATH/.config ] && mv $CONFIG_PATH/.config ./.config
          [ -f $CONFIG_PATH/patchs/after_feeds.sh ] && $CONFIG_PATH/patchs/after_feeds.sh || :

          grep -q "CONFIG_CCACHE=" .config && sed -i 's/CONFIG_CCACHE=.*/CONFIG_CCACHE=y/' .config || sed -i '$a CONFIG_CCACHE=y' .config
          
          make defconfig
          make download -j8
          find dl -size -1024c -exec rm -f {} \;
          
          [ -f $CONFIG_PATH/patchs/before_compile.sh ] && $CONFIG_PATH/patchs/before_compile.sh || :
          
          echo "$(nproc) threads compilation started"
          make -j$(nproc) || make -j1 V=s
          
          [ -f $CONFIG_PATH/patchs/after_compile.sh ] && $CONFIG_PATH/patchs/after_compile.sh || :
          
          cd bin/targets/*/*
          rm -rf packages
          sed -i -E "/[[:space:]]([^/]*\.buildinfo|profiles\.json)$/d" sha256sums
          rm -f *.buildinfo profiles.json
          
          BUILD_DATE=$(date +"%Y%m%d%H%M")
          echo "FIRMWARE=$PWD" >> $GITHUB_ENV
          echo "RELEASE_TAG=${{ env.CONFIG_NAME }}-$BUILD_DATE" >> $GITHUB_ENV
          echo "status=success" >> $GITHUB_OUTPUT
          
          echo "## OpenWrt 固件发布日志" > $GITHUB_WORKSPACE/release_body.md
          echo "* **编译时间**：$(date "+%Y-%m-%d %H:%M:%S")" >> $GITHUB_WORKSPACE/release_body.md
          echo "* **配置方案**：${{ env.CONFIG_NAME }}" >> $GITHUB_WORKSPACE/release_body.md
          echo "* **文件列表**：" >> $GITHUB_WORKSPACE/release_body.md
          ls -lh | awk '{print "  * ["$9 "] ("$5")"}' >> $GITHUB_WORKSPACE/release_body.md

      - name: Publish to GitHub Releases
        uses: ncipollo/release-action@v1
        if: steps.compile.outputs.status == 'success'
        with:
          token: ${{ github.token }}
          tag: ${{ env.RELEASE_TAG }}
          name: "OpenWrt Firmware | ${{ env.RELEASE_TAG }}"
          bodyFile: ${{ github.workspace }}/release_body.md
          artifacts: "${{ env.FIRMWARE }}/*"
          allowUpdates: true
          artifactErrorsFailBuild: true

      - name: Delete Old Workflow Runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 2